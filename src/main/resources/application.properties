spring.application.name=pyramid
# ==============================
# 기본 DB 설정
# ==============================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://10.10.40.136:3306/JEDAI_CUBE?allowMultiQueries=true&characterEncoding=utf-8&interactiveClient=true&autoReconnect=true&autoReconnectForPools=true
